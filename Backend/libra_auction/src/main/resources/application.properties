spring.config.import=optional:file:.env[.properties]
spring.application.name=libra_auction

# DataSource Configuration
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# Database Initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:init.sql

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=db/changelog/db.changelog-master.yaml

# Server Configuration
server.port=8080
#server.servlet.context-path=/identity

# JWT Configuration
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=${JWT_VALID_DURATION:3600}
jwt.refreshable-duration=${JWT_REFRESHABLE_DURATION:36000}

app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.scope=email,profile

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000




