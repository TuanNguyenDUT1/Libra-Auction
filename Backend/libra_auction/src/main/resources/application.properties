spring.config.import=optional:file:.env[.properties]
spring.application.name=libra_auction

# DataSource Configuration
spring.datasource.url=${}
spring.datasource.username=${}
spring.datasource.password=${}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate Configuration
# IMPORTANT: Use 'validate' in production to prevent accidental schema changes
# Use 'update' only in development, and make sure to backup database before running
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# Database Initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:init.sql

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=db/changelog/db.changelog-master.yaml

# Server Configuration
server.port=8080
#server.servlet.context-path=/identity

# JWT Configuration (RS256)
# Load keys from files or environment variables
jwt.private-key=${}
jwt.public-key=${}
jwt.valid-duration=${JWT_VALID_DURATION:3600}
jwt.refreshable-duration=${JWT_REFRESHABLE_DURATION:36000}




