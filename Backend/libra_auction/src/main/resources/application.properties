spring.config.import=optional:file:.env[.properties],optional:configtree:./certs/
spring.application.name=libra_auction
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# DataSource Configuration
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none

# Liquibase Configuration
spring.liquibase.enabled=false

# Server Configuration
# server.port=8080
#server.servlet.context-path=/identity

# JWT Configuration
app.jwt.expiration=86400000
app.jwt.refreshable-duration=604800000

# Google OAuth2 Configuration
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# Redis Configuration - REDIS CLOUD
spring.redis.host=redis-i8721.c251.east-us-mz.azure.cloud.redislabs.com
spring.redis.port=18721
spring.redis.username=default
spring.redis.password=kSqohyHylRNItOORlOzxeR9blWt4Cg3d
spring.redis.ssl=true
spring.redis.timeout=30000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM:noreply@auction.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Configuration
app.auction.name=${AUCTION_NAME:Libra Auction}
